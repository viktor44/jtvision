name: Release

on:
  workflow_dispatch:
    inputs:
      INCREMENT_VERSION:
        description: "Increment version X.Y.Z: X - major, Y - minor, Z - patch"
        type: choice
        required: true
        default: "none"
        options:
          - none
          - patch
          - minor
          - major

jobs:
  publish-release:
    runs-on: ubuntu-latest
    
#    permissions:
#      contents: write
    permissions: write-all

    steps:
      - name: Check branch
        if: github.ref_name != github.event.repository.default_branch
        run: |
          MESSAGE="This action can be run on '${{ github.event.repository.default_branch }}' branch only"
          echo ":x: $MESSAGE" >> $GITHUB_STEP_SUMMARY
          echo $MESSAGE
          exit 1

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'
#          token: '${{ secrets.GITHUB_TOKEN }}'

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: 'zulu'
          server-id: central-sonatype
          server-username: CENTRAL_REPO_USER
          server-password: CENTRAL_REPO_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Deploy
        env:
          CENTRAL_REPO_USER: ${{ secrets.CENTRAL_REPO_USER }}
          CENTRAL_REPO_PASSWORD: ${{ secrets.CENTRAL_REPO_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          #set -x;
          CURRENT_VERSION="$(mvn org.apache.maven.plugins:maven-help-plugin:evaluate -Dexpression=project.version -q -DforceStdout)"
          echo "Current version is $CURRENT_VERSION" 
          NEXT_RELEASE_VERSION="$(./.github/increment_version.sh ${{ inputs.INCREMENT_VERSION }} $CURRENT_VERSION)"
          echo "New release version is $NEXT_RELEASE_VERSION"
          NEXT_DEVELOPMENT_VERSION="$(./.github/increment_version.sh patch $NEXT_RELEASE_VERSION)-SNAPSHOT"
          echo "New development version is $NEXT_DEVELOPMENT_VERSION"

          git config --global user.name 'Releaser'
          git config --global user.email 'releaser@users.noreply.github.com'

          mvn versions:set versions:commit \
            --batch-mode --no-transfer-progress \
            -DnewVersion=${NEXT_RELEASE_VERSION}
          
          git commit -am "Release version ${NEXT_RELEASE_VERSION}"
          git tag -a "v${NEXT_RELEASE_VERSION}" -m "Release version ${NEXT_RELEASE_VERSION}"
          
          mvn deploy \
            --batch-mode --no-transfer-progress \
            -DskipTests -Dgpg.skip=false
          mvn versions:set versions:commit \
            --batch-mode --no-transfer-progress \
            -DnewVersion=${NEXT_DEVELOPMENT_VERSION}

          git commit -am "Start development of version ${NEXT_DEVELOPMENT_VERSION}"
          git push origin HEAD:main --tags
